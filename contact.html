    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="name">
                <a href="index.html" class="logo">Tawananyasha</a>
            </div>

            <div class="navlinks">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="projects.html">Projects</a>
                <a href="contact.html">Contact</a>
            </div>
        </nav>
    </header>

    <section class="contact-page">
        <div class="contact-text">
            <h1>Contact Me</h1>
            <p>
                Feel free to get in touch with me for collaboration, projects, or any opportunities.
                You can send me a message using the form below.
            </p>

            <div class="contact-details">
                <p><strong>Email:</strong> <a href="mailto:tawananyashamarekwa@gmail.com">tawananyashamarekwa@gmail.com</a></p>
                <p><strong>Phone:</strong> 0786256914</p>
            </div>
        </div>

        <div class="contact-form-box">
            <form action="#" method="post" class="contact-form">
                <input type="text" name="fullname" placeholder="Your Name" required>
                <input type="email" name="email" placeholder="Your Email" required>
                <textarea name="message" rows="6" placeholder="Your Message" required></textarea>
                <button type="submit" class="calltoactionabout">Send Message</button>
            </form>
        </div>
    </section>

</body>
